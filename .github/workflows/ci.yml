name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --exit-zero
      - name: Smoke test (run pipeline against sample docs)
        run: python main.py "What does this project demonstrate?"
